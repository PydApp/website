<p class="p2 f2">我们经常需要倒计时，从厨房煮鸡蛋到天文学发射火箭。但有时当计数器倒计时时我们需</p>
<p class="p2 f3"><span class="f2">要把重点放在另一个任务上。因此发</span><span class="f4"> </span><span class="f5">声倒计时的好处是告诉你所选择的倒计时</span><span class="f4"> </span><span class="f5">的步骤</span><span class="f4"> </span><span class="f5">。</span></p>
<p class="p2 f3"><span class="f2">你可以使用</span><span class="f4"> 2 </span><span class="f5">种方式来倒计时</span><span class="f4"> </span><span class="f5">：</span></p>
<p class="p2 f6"><span class="f7">-</span><span class="f5">自由倒计时，就是通过指定倒计时的时间长度来倒计时，</span></p>
<p class="p2 f6"><span class="f7">-</span><span class="f5">同步倒计时，就是倒计时到指定的时间。</span></p>
<p class="p2 f3"><span class="f2">在两种情况下，你都可以要求在倒计时快结</span><span class="f4"> </span><span class="f5">束时发出声音。</span></p>
